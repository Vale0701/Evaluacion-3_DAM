name: paquexpress
description: Aplicación móvil para agentes de entrega de Paquexpress S.A. de C.V.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests
  http: ^1.2.0

  # Guardar el JWT localmente
  shared_preferences: ^2.2.2

  # Galería / cámara
  image_picker: ^1.0.7

  # Mapa interactivo (OpenStreetMap, sin API key)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true